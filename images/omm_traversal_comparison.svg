<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#89b4fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f38ba8"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9e2af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#cdd6f4" font-size="17" font-weight="bold">BVH Traversal: Before vs After Opacity Micromaps</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="485" stroke="#585b70" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- ======================================================= -->
  <!-- LEFT HALF — WITHOUT OMM                                  -->
  <!-- ======================================================= -->
  <text x="225" y="60" text-anchor="middle" fill="#f38ba8" font-size="15" font-weight="bold">Without OMM</text>
  <text x="225" y="76" text-anchor="middle" fill="#9399b2" font-size="12">Standard Alpha Testing</text>

  <!-- Flow: boxes connected by arrows -->
  <!-- Box 1: Ray -->
  <rect x="155" y="90" width="140" height="36" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="225" y="113" text-anchor="middle" fill="#89b4fa" font-size="13">Shadow Ray Cast</text>

  <!-- Arrow down -->
  <line x1="225" y1="126" x2="225" y2="145" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Box 2: BVH Test -->
  <rect x="155" y="146" width="140" height="36" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="225" y="169" text-anchor="middle" fill="#89b4fa" font-size="13">BVH Box Test</text>

  <!-- Arrow down -->
  <line x1="225" y1="182" x2="225" y2="201" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Box 3: Triangle Hit -->
  <rect x="155" y="202" width="140" height="36" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="225" y="225" text-anchor="middle" fill="#89b4fa" font-size="13">Triangle Candidate</text>

  <!-- Arrow down -->
  <line x1="225" y1="238" x2="225" y2="257" stroke="#f38ba8" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Box 4: Any-Hit Shader — RED, expensive -->
  <rect x="140" y="258" width="170" height="42" rx="6" fill="#3b1a1a" stroke="#f38ba8" stroke-width="2"/>
  <text x="225" y="276" text-anchor="middle" fill="#f38ba8" font-size="13" font-weight="bold">Any-Hit Shader</text>
  <text x="225" y="292" text-anchor="middle" fill="#9399b2" font-size="11">runs every hit</text>

  <!-- Arrow down -->
  <line x1="225" y1="300" x2="225" y2="319" stroke="#f38ba8" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Box 5: Sample Texture -->
  <rect x="140" y="320" width="170" height="42" rx="6" fill="#3b1a1a" stroke="#f38ba8" stroke-width="2"/>
  <text x="225" y="338" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">Sample Alpha Texture</text>
  <text x="225" y="354" text-anchor="middle" fill="#9399b2" font-size="11">cache miss likely</text>

  <!-- Arrow down -->
  <line x1="225" y1="362" x2="225" y2="381" stroke="#f38ba8" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Box 6: Alpha Decision -->
  <rect x="140" y="382" width="170" height="36" rx="6" fill="#3b1a1a" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="225" y="405" text-anchor="middle" fill="#f38ba8" font-size="12">Alpha ≥ 0.5 → block</text>

  <!-- Loop back arrow (transparent case) -->
  <path d="M140,395 Q60,395 60,220 Q60,202 155,202" stroke="#f38ba8" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="38" y="315" fill="#f38ba8" font-size="10" text-anchor="middle">Loop:</text>
  <text x="38" y="328" fill="#f38ba8" font-size="10" text-anchor="middle">next</text>
  <text x="38" y="341" fill="#f38ba8" font-size="10" text-anchor="middle">triangle</text>

  <!-- Cost summary -->
  <rect x="100" y="430" width="250" height="45" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="225" y="450" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">N shader invocations per ray</text>
  <text x="225" y="466" text-anchor="middle" fill="#9399b2" font-size="11">divergence + cache misses = slow</text>

  <!-- ======================================================= -->
  <!-- RIGHT HALF — WITH OMM                                    -->
  <!-- ======================================================= -->
  <text x="675" y="60" text-anchor="middle" fill="#a6e3a1" font-size="15" font-weight="bold">With Opacity Micromaps</text>
  <text x="675" y="76" text-anchor="middle" fill="#9399b2" font-size="12">Micromap-Assisted Traversal</text>

  <!-- Box 1: Ray -->
  <rect x="605" y="90" width="140" height="36" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="675" y="113" text-anchor="middle" fill="#89b4fa" font-size="13">Shadow Ray Cast</text>

  <line x1="675" y1="126" x2="675" y2="145" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Box 2: BVH -->
  <rect x="605" y="146" width="140" height="36" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="675" y="169" text-anchor="middle" fill="#89b4fa" font-size="13">BVH Box Test</text>

  <line x1="675" y1="182" x2="675" y2="201" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Box 3: Micromap Check — PURPLE, special -->
  <rect x="590" y="202" width="170" height="42" rx="6" fill="#2d1f4a" stroke="#cba6f7" stroke-width="2.5"/>
  <text x="675" y="222" text-anchor="middle" fill="#cba6f7" font-size="13" font-weight="bold">Micromap Check</text>
  <text x="675" y="237" text-anchor="middle" fill="#9399b2" font-size="10">Fixed-function hardware</text>

  <!-- Three-way branch -->
  <line x1="675" y1="244" x2="675" y2="263" stroke="#cba6f7" stroke-width="2"/>

  <!-- Diamond decision node -->
  <polygon points="675,263 720,288 675,313 630,288" fill="#2d1f4a" stroke="#cba6f7" stroke-width="2"/>
  <text x="675" y="285" text-anchor="middle" fill="#cba6f7" font-size="11" font-weight="bold">State?</text>

  <!-- Left branch: Opaque -->
  <line x1="630" y1="288" x2="530" y2="310" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="470" y="310" width="110" height="42" rx="6" fill="#1a3a1a" stroke="#a6e3a1" stroke-width="2"/>
  <text x="525" y="329" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold">Opaque</text>
  <text x="525" y="343" text-anchor="middle" fill="#a6e3a1" font-size="10">Blocked — No shader</text>

  <!-- Right branch: Transparent -->
  <line x1="720" y1="288" x2="820" y2="310" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="770" y="310" width="110" height="42" rx="6" fill="#1a3a1a" stroke="#a6e3a1" stroke-width="2"/>
  <text x="825" y="329" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold">Transparent</text>
  <text x="825" y="343" text-anchor="middle" fill="#a6e3a1" font-size="10">Passed — No shader</text>

  <!-- Down branch: Unknown -->
  <line x1="675" y1="313" x2="675" y2="333" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrowYellow)"/>
  <rect x="595" y="333" width="160" height="42" rx="6" fill="#3b341a" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="675" y="352" text-anchor="middle" fill="#f9e2af" font-size="12" font-weight="bold">Unknown</text>
  <text x="675" y="366" text-anchor="middle" fill="#9399b2" font-size="10">→ any-hit shader (rare)</text>

  <!-- "No shader" badges -->
  <text x="525" y="366" text-anchor="middle" fill="#a6e3a1" font-size="10">✓ Hardware only</text>
  <text x="825" y="366" text-anchor="middle" fill="#a6e3a1" font-size="10">✓ Hardware only</text>

  <!-- Cost summary -->
  <rect x="548" y="430" width="255" height="45" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="675" y="450" text-anchor="middle" fill="#a6e3a1" font-size="12" font-weight="bold">~5% shader invocations per ray</text>
  <text x="675" y="466" text-anchor="middle" fill="#9399b2" font-size="11">mostly hardware-handled = fast</text>
</svg>
