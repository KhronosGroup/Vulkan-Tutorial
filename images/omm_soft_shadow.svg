<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <!-- Gradient for penumbra blending on ground -->
    <linearGradient id="penum_left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#313244"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="penum_right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#11111b"/>
      <stop offset="100%" stop-color="#313244"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#cdd6f4" font-size="17" font-weight="bold">Soft Shadows — Area Light Source</text>

  <!-- Ground plane -->
  <rect x="0" y="330" width="800" height="120" fill="#313244"/>

  <!-- Penumbra left (gradient) -->
  <rect x="195" y="330" width="110" height="55" fill="url(#penum_left)"/>
  <!-- Umbra (darkest) -->
  <rect x="305" y="330" width="220" height="55" fill="#11111b"/>
  <!-- Penumbra right (gradient) -->
  <rect x="525" y="330" width="110" height="55" fill="url(#penum_right)"/>

  <!-- Shadow region labels -->
  <text x="145" y="370" text-anchor="middle" fill="#a6e3a1" font-size="13" font-weight="bold">Fully Lit</text>
  <text x="250" y="365" text-anchor="middle" fill="#f9e2af" font-size="12" font-weight="bold">Penumbra</text>
  <text x="250" y="380" text-anchor="middle" fill="#f9e2af" font-size="11">(Partial Shadow)</text>
  <text x="415" y="364" text-anchor="middle" fill="#cba6f7" font-size="13" font-weight="bold">Umbra</text>
  <text x="415" y="379" text-anchor="middle" fill="#cba6f7" font-size="11">(Full Shadow)</text>
  <text x="580" y="365" text-anchor="middle" fill="#f9e2af" font-size="12" font-weight="bold">Penumbra</text>
  <text x="580" y="380" text-anchor="middle" fill="#f9e2af" font-size="11">(Partial Shadow)</text>
  <text x="700" y="370" text-anchor="middle" fill="#a6e3a1" font-size="13" font-weight="bold">Fully Lit</text>

  <!-- Opaque Object -->
  <rect x="310" y="200" width="130" height="130" rx="4" fill="#89b4fa" opacity="0.9" stroke="#74c7ec" stroke-width="2"/>
  <text x="375" y="261" text-anchor="middle" fill="#1e1e2e" font-size="13" font-weight="bold">Opaque</text>
  <text x="375" y="277" text-anchor="middle" fill="#1e1e2e" font-size="13" font-weight="bold">Object</text>

  <!-- Area Light (elongated bar) -->
  <rect x="55" y="72" width="140" height="30" rx="8" fill="#fab387" opacity="0.92" stroke="#fe8019" stroke-width="2"/>
  <circle cx="75"  cy="87" r="8" fill="#f9e2af" opacity="0.95"/>
  <circle cx="105" cy="87" r="8" fill="#f9e2af" opacity="0.95"/>
  <circle cx="135" cy="87" r="8" fill="#f9e2af" opacity="0.95"/>
  <circle cx="165" cy="87" r="8" fill="#f9e2af" opacity="0.95"/>
  <text x="125" y="122" text-anchor="middle" fill="#fab387" font-size="13" font-weight="bold">Area Light Source</text>
  <text x="125" y="138" text-anchor="middle" fill="#9399b2" font-size="11">(finite size = soft edges)</text>

  <!-- Rays from LEFT edge of area light -->
  <!-- to top-left of object (defines right penumbra boundary) -->
  <line x1="75" y1="97" x2="310" y2="200" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="310" y1="200" x2="195" y2="330" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.25"/>
  <!-- to bottom-left of object -->
  <line x1="75" y1="97" x2="310" y2="330" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,4" opacity="0.2"/>

  <!-- Rays from CENTER of area light -->
  <line x1="125" y1="97" x2="310" y2="200" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.4"/>
  <line x1="310" y1="200" x2="260" y2="330" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.2"/>
  <line x1="125" y1="97" x2="440" y2="200" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.4"/>
  <line x1="440" y1="200" x2="570" y2="330" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.2"/>

  <!-- Rays from RIGHT edge of area light -->
  <!-- to top-right of object (defines left penumbra boundary) -->
  <line x1="175" y1="97" x2="440" y2="200" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="440" y1="200" x2="635" y2="330" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.25"/>
  <!-- to bottom-right of object -->
  <line x1="175" y1="97" x2="440" y2="330" stroke="#f9e2af" stroke-width="1" stroke-dasharray="3,4" opacity="0.2"/>

  <!-- Penumbra boundary markers -->
  <line x1="195" y1="325" x2="195" y2="355" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="305" y1="325" x2="305" y2="350" stroke="#cba6f7" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="525" y1="325" x2="525" y2="350" stroke="#cba6f7" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="635" y1="325" x2="635" y2="355" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Explanatory note at bottom -->
  <rect x="240" y="400" width="320" height="38" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="400" y="416" text-anchor="middle" fill="#9399b2" font-size="11">Multiple light points mean different parts</text>
  <text x="400" y="431" text-anchor="middle" fill="#9399b2" font-size="11">of the object block different parts of the light</text>
</svg>
