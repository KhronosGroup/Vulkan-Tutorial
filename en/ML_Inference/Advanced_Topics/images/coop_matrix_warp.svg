<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff" rx="15" ry="15" stroke="#eee" stroke-width="2"/>

  <!-- Warp / Subgroup Container -->
  <rect x="50" y="50" width="700" height="300" fill="#fcfcfc" stroke="#333" stroke-width="3" rx="10"/>
  <text x="60" y="40" font-family="Arial" font-size="18" font-weight="bold">GPU Warp / Subgroup (32 Threads)</text>

  <!-- Matrix A (Rows distributed) -->
  <rect x="80" y="80" width="150" height="150" fill="#e7f3ff" stroke="#007bff" stroke-width="2"/>
  <text x="80" y="75" font-family="Arial" font-size="14" font-weight="bold">Matrix A (16x16)</text>

  <!-- Rows as thread ownership -->
  <line x1="80" y1="90" x2="230" y2="90" stroke="#007bff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="240" y="95" font-family="Arial" font-size="10">Thread 0 (Row 0)</text>
  <line x1="80" y1="100" x2="230" y2="100" stroke="#007bff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="240" y="105" font-family="Arial" font-size="10">Thread 1 (Row 1)</text>
  <text x="240" y="130" font-family="Arial" font-size="10">...</text>
  <line x1="80" y1="220" x2="230" y2="220" stroke="#007bff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="240" y="225" font-family="Arial" font-size="10">Thread 15 (Row 15)</text>

  <!-- Multiply Sign -->
  <text x="350" y="165" font-family="Arial" font-size="40" font-weight="bold">×</text>

  <!-- Matrix B (Columns distributed) -->
  <rect x="420" y="80" width="150" height="150" fill="#fff3cd" stroke="#856404" stroke-width="2"/>
  <text x="420" y="75" font-family="Arial" font-size="14" font-weight="bold">Matrix B (16x16)</text>

  <!-- Columns as thread ownership -->
  <line x1="430" y1="80" x2="430" y2="230" stroke="#856404" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="420" y="245" font-family="Arial" font-size="10">T0..15 (Col 0)</text>

  <!-- Arrow to Hardware -->
  <path d="M 300 250 L 300 320" stroke="#333" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- Hardware Block -->
  <rect x="200" y="320" width="400" height="60" fill="#d4edda" stroke="#155724" stroke-width="3" rx="5"/>
  <text x="250" y="355" font-family="Arial" font-size="20" font-weight="bold" fill="#155724">TENSOR CORE / WMMA / XMX</text>

  <!-- Intuition -->
  <text x="610" y="100" font-family="Arial" font-size="12" font-style="italic">Opaque Ownership:</text>
  <text x="610" y="120" font-family="Arial" font-size="11">The hardware decodes</text>
  <text x="610" y="135" font-family="Arial" font-size="11">register indices to</text>
  <text x="610" y="150" font-family="Arial" font-size="11">perform parallel dot-</text>
  <text x="610" y="165" font-family="Arial" font-size="11">products in one cycle.</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>
</svg>
