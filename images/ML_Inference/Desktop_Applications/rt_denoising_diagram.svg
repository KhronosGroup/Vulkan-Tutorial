<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8f9fa" />

  <!-- Inputs -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="120" height="40" rx="5" fill="#e9ecef" stroke="#343a40" stroke-width="2"/>
    <text x="60" y="25" font-family="Arial" font-size="14" text-anchor="middle">Noisy Color</text>

    <rect x="0" y="60" width="120" height="40" rx="5" fill="#e9ecef" stroke="#343a40" stroke-width="2"/>
    <text x="60" y="85" font-family="Arial" font-size="14" text-anchor="middle">Albedo</text>

    <rect x="0" y="120" width="120" height="40" rx="5" fill="#e9ecef" stroke="#343a40" stroke-width="2"/>
    <text x="60" y="145" font-family="Arial" font-size="14" text-anchor="middle">Normals</text>

    <rect x="0" y="180" width="120" height="40" rx="5" fill="#e9ecef" stroke="#343a40" stroke-width="2"/>
    <text x="60" y="205" font-family="Arial" font-size="14" text-anchor="middle">Depth</text>

    <text x="60" y="-10" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Vulkan G-Buffer</text>
  </g>

  <!-- Connections to Encoder -->
  <path d="M 170 70 L 250 150" stroke="#343a40" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 170 110 L 250 150" stroke="#343a40" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 170 170 L 250 150" stroke="#343a40" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 170 230 L 250 150" stroke="#343a40" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- U-Net Architecture -->
  <g transform="translate(250, 50)">
    <!-- Encoder -->
    <path d="M 0 100 L 100 150 L 100 50 Z" fill="#007bff" opacity="0.8" stroke="#0056b3" stroke-width="2"/>
    <text x="40" y="105" font-family="Arial" font-size="14" fill="white" text-anchor="middle" transform="rotate(-26, 40, 105)">Encoder</text>

    <!-- Latent Space -->
    <rect x="100" y="80" width="40" height="40" fill="#6c757d" stroke="#495057" stroke-width="2"/>
    <text x="120" y="140" font-family="Arial" font-size="12" text-anchor="middle">Latent</text>

    <!-- Decoder -->
    <path d="M 140 50 L 140 150 L 240 100 Z" fill="#28a745" opacity="0.8" stroke="#1e7e34" stroke-width="2"/>
    <text x="190" y="105" font-family="Arial" font-size="14" fill="white" text-anchor="middle" transform="rotate(26, 190, 105)">Decoder</text>

    <text x="120" y="-10" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">AI Denoiser (U-Net)</text>

    <!-- Skip Connection -->
    <path d="M 20 70 Q 120 20 220 70" stroke="#dc3545" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="120" y="40" font-family="Arial" font-size="12" fill="#dc3545" text-anchor="middle">Skip Connection (Preserves Detail)</text>
  </g>

  <!-- Output -->
  <g transform="translate(550, 130)">
    <rect x="0" y="0" width="150" height="40" rx="5" fill="#ffc107" stroke="#d39e00" stroke-width="2"/>
    <text x="75" y="25" font-family="Arial" font-size="14" text-anchor="middle">Clean Color Image</text>
    <path d="M -60 20 L -10 20" stroke="#343a40" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#343a40" />
    </marker>
  </defs>
</svg>
