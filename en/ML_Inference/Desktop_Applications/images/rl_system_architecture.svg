<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Vulkan App -->
  <rect x="250" y="20" width="300" height="100" rx="10" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3"/>
  <text x="400" y="65" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#7b1fa2">Vulkan Application</text>
  <text x="400" y="90" font-family="Arial" font-size="14" text-anchor="middle" fill="#7b1fa2">(Headless or Visible Window)</text>

  <!-- RL Agent -->
  <rect x="150" y="220" width="200" height="120" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
  <text x="250" y="260" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#1976d2">RL Agent</text>
  <text x="250" y="285" font-family="Arial" font-size="13" text-anchor="middle" fill="#1976d2">(PPO Algorithm)</text>
  <text x="250" y="310" font-family="Arial" font-size="12" font-style="italic" text-anchor="middle" fill="#1976d2">"Decides what to do"</text>

  <!-- RND Module -->
  <rect x="450" y="220" width="200" height="120" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
  <text x="550" y="260" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#2e7d32">RND Module</text>
  <text x="550" y="285" font-family="Arial" font-size="13" text-anchor="middle" fill="#2e7d32">(Curiosity Brain)</text>
  <text x="550" y="310" font-family="Arial" font-size="12" font-style="italic" text-anchor="middle" fill="#2e7d32">"Generates Reward"</text>

  <!-- Action Executor -->
  <rect x="250" y="400" width="300" height="80" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
  <text x="400" y="440" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#ef6c00">Action Executor</text>
  <text x="400" y="460" font-family="Arial" font-size="14" text-anchor="middle" fill="#ef6c00">Injects clicks &amp; keystrokes</text>

  <!-- Connections -->
  <!-- App to Agent/RND -->
  <path d="M 400 120 L 400 180 L 250 180 L 250 220" fill="none" stroke="#424242" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 400 180 L 550 180 L 550 220" fill="none" stroke="#424242" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="410" y="160" font-family="Arial" font-size="12" text-anchor="start" fill="#424242">Observation (Frames)</text>

  <!-- Agent to RND -->
  <path d="M 350 280 L 450 280" fill="none" stroke="#424242" stroke-width="2" marker-end="url(#arrowhead)" marker-start="url(#arrowhead)"/>
  <text x="400" y="275" font-family="Arial" font-size="11" text-anchor="middle" fill="#424242">Reward</text>

  <!-- Agent to Executor -->
  <path d="M 250 340 L 250 370 L 400 370 L 400 400" fill="none" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="325" y="365" font-family="Arial" font-size="12" text-anchor="middle" fill="#1976d2">Action Selection</text>

  <!-- Executor back to App (closed loop) -->
  <path d="M 550 440 L 750 440 L 750 70 L 550 70" fill="none" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="755" y="250" font-family="Arial" font-size="12" text-anchor="middle" fill="#ef6c00" transform="rotate(-90, 755, 250)">Feedback Loop</text>

  <!-- Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="context-stroke" />
    </marker>
  </defs>
</svg>
