<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Pyramid Shape -->
  <polygon points="300,50 550,350 50,350" fill="#f5f5f5" stroke="#424242" stroke-width="2"/>

  <!-- Level 3 (Top) -->
  <polygon points="300,50 375,150 225,150" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="300" y="110" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2e7d32">Level 3: Semantic</text>
  <text x="300" y="130" font-family="Arial" font-size="11" text-anchor="middle" fill="#2e7d32">(Custom ML Model)</text>

  <!-- Level 2 (Middle) -->
  <polygon points="225,150 375,150 450,250 150,250" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="300" y="200" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef6c00">Level 2: Functional</text>
  <text x="300" y="220" font-family="Arial" font-size="11" text-anchor="middle" fill="#ef6c00">(OCR / LPIPS)</text>

  <!-- Level 1 (Bottom) -->
  <polygon points="150,250 450,250 525,350 75,350" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="300" y="300" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976d2">Level 1: Sanity</text>
  <text x="300" y="320" font-family="Arial" font-size="11" text-anchor="middle" fill="#1976d2">(Pixel Comparison)</text>

  <!-- Labels on the side -->
  <text x="500" y="300" font-family="Arial" font-size="12" font-style="italic" fill="#757575">Fast &amp; Cheap</text>
  <text x="400" y="100" font-family="Arial" font-size="12" font-style="italic" fill="#757575">Slow &amp; Deep</text>

  <path d="M 520 330 L 520 70" fill="none" stroke="#757575" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="530" y="200" font-family="Arial" font-size="11" text-anchor="start" fill="#757575" transform="rotate(-90, 530, 200)">Complexity</text>
</svg>
