<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" width="700" height="600" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#89b4fa"/>
    </marker>
    <marker id="arrowP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cba6f7"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f38ba8"/>
    </marker>
    <marker id="arrowY" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9e2af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="600" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#cdd6f4" font-size="16" font-weight="bold">Shadow Ray Lifecycle with Opacity Micromaps</text>

  <!-- ============================================= -->
  <!-- NODE 1: Shadow Ray Cast                       -->
  <!-- ============================================= -->
  <rect x="240" y="44" width="220" height="38" rx="7" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="350" y="68" text-anchor="middle" fill="#89b4fa" font-size="13" font-weight="bold">Shadow Ray Cast</text>
  <line x1="350" y1="82" x2="350" y2="101" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- ============================================= -->
  <!-- NODE 2: Enter BVH                             -->
  <!-- ============================================= -->
  <rect x="240" y="102" width="220" height="38" rx="7" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="350" y="126" text-anchor="middle" fill="#89b4fa" font-size="13">Enter BVH — Test Boxes</text>
  <line x1="350" y1="140" x2="350" y2="159" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- ============================================= -->
  <!-- NODE 3: Triangle Candidate                    -->
  <!-- ============================================= -->
  <rect x="240" y="160" width="220" height="38" rx="7" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="350" y="184" text-anchor="middle" fill="#89b4fa" font-size="13">Triangle Candidate Found</text>
  <line x1="350" y1="198" x2="350" y2="217" stroke="#cba6f7" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- ============================================= -->
  <!-- NODE 4: Consult Micromap (the KEY new node)   -->
  <!-- ============================================= -->
  <rect x="225" y="218" width="250" height="44" rx="7" fill="#2d1f4a" stroke="#cba6f7" stroke-width="2.5"/>
  <text x="350" y="237" text-anchor="middle" fill="#cba6f7" font-size="13" font-weight="bold">Consult Opacity Micromap</text>
  <text x="350" y="253" text-anchor="middle" fill="#9399b2" font-size="10">Hardware fixed-function — no shader cost</text>

  <!-- ============================================= -->
  <!-- DIAMOND DECISION                              -->
  <!-- ============================================= -->
  <polygon points="350,272 402,300 350,328 298,300" fill="#2d1f4a" stroke="#cba6f7" stroke-width="2"/>
  <text x="350" y="297" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold">State?</text>
  <line x1="350" y1="262" x2="350" y2="271" stroke="#cba6f7" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- ============================================= -->
  <!-- LEFT BRANCH: Opaque → Blocked                 -->
  <!-- ============================================= -->
  <line x1="298" y1="300" x2="165" y2="300" stroke="#f38ba8" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="228" y="293" text-anchor="middle" fill="#f38ba8" font-size="11">Opaque</text>
  <rect x="55" y="282" width="110" height="36" rx="7" fill="#3b1a1a" stroke="#f38ba8" stroke-width="2"/>
  <text x="110" y="298" text-anchor="middle" fill="#f38ba8" font-size="12" font-weight="bold">Ray Blocked</text>
  <text x="110" y="311" text-anchor="middle" fill="#f38ba8" font-size="11">→ In Shadow!</text>

  <!-- Opaque annotation -->
  <text x="110" y="332" text-anchor="middle" fill="#a6e3a1" font-size="10">✓ No shader needed</text>

  <!-- ============================================= -->
  <!-- RIGHT BRANCH: Transparent → Continues        -->
  <!-- ============================================= -->
  <line x1="402" y1="300" x2="535" y2="300" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="470" y="293" text-anchor="middle" fill="#a6e3a1" font-size="11">Transparent</text>
  <rect x="535" y="282" width="120" height="36" rx="7" fill="#1a3a1a" stroke="#a6e3a1" stroke-width="2"/>
  <text x="595" y="298" text-anchor="middle" fill="#a6e3a1" font-size="12" font-weight="bold">Ray Passes</text>
  <text x="595" y="311" text-anchor="middle" fill="#a6e3a1" font-size="11">Continue BVH</text>

  <!-- Loop back from transparent to BVH -->
  <path d="M595,282 Q640,240 640,120 Q640,102 460,102" stroke="#a6e3a1" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowG)"/>
  <text x="655" y="200" text-anchor="middle" fill="#a6e3a1" font-size="10">next</text>
  <text x="655" y="213" text-anchor="middle" fill="#a6e3a1" font-size="10">tri?</text>

  <!-- Transparent annotation -->
  <text x="595" y="332" text-anchor="middle" fill="#a6e3a1" font-size="10">✓ No shader needed</text>

  <!-- ============================================= -->
  <!-- DOWN BRANCH: Unknown → Any-Hit Shader         -->
  <!-- ============================================= -->
  <line x1="350" y1="328" x2="350" y2="352" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="368" y="345" fill="#f9e2af" font-size="11">Unknown</text>

  <!-- Any-hit shader box -->
  <rect x="235" y="353" width="230" height="40" rx="7" fill="#3b341a" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="350" y="372" text-anchor="middle" fill="#f9e2af" font-size="13" font-weight="bold">Any-Hit Shader Runs</text>
  <text x="350" y="386" text-anchor="middle" fill="#9399b2" font-size="10">rare — only for edge micro-triangles</text>

  <line x1="350" y1="393" x2="350" y2="412" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrowY)"/>

  <!-- Check alpha box -->
  <rect x="235" y="413" width="230" height="36" rx="7" fill="#3b341a" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="350" y="432" text-anchor="middle" fill="#f9e2af" font-size="12">Check Alpha Texture</text>
  <text x="350" y="444" text-anchor="middle" fill="#9399b2" font-size="10">(same as before, but rare)</text>

  <!-- Two sub-branches -->
  <line x1="350" y1="449" x2="350" y2="465" stroke="#f9e2af" stroke-width="1.5"/>

  <!-- Sub-branch left: transparent continue -->
  <line x1="350" y1="465" x2="240" y2="482" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <rect x="130" y="482" width="110" height="34" rx="5" fill="#1a3a1a" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="185" y="498" text-anchor="middle" fill="#a6e3a1" font-size="11">α &lt; 0.5</text>
  <text x="185" y="510" text-anchor="middle" fill="#a6e3a1" font-size="10">Continue</text>

  <!-- Sub-branch right: opaque block -->
  <line x1="350" y1="465" x2="460" y2="482" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="460" y="482" width="110" height="34" rx="5" fill="#3b1a1a" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="515" y="498" text-anchor="middle" fill="#f38ba8" font-size="11">α ≥ 0.5</text>
  <text x="515" y="510" text-anchor="middle" fill="#f38ba8" font-size="10">Blocked</text>

  <!-- ============================================= -->
  <!-- TERMINAL: No hit = lit                        -->
  <!-- ============================================= -->
  <rect x="255" y="540" width="190" height="36" rx="7" fill="#1a3a1a" stroke="#a6e3a1" stroke-width="2.5"/>
  <text x="350" y="557" text-anchor="middle" fill="#a6e3a1" font-size="13" font-weight="bold">No Hit Found</text>
  <text x="350" y="571" text-anchor="middle" fill="#a6e3a1" font-size="12">→ Point is Lit ☀</text>

  <!-- Arrow from α<0.5 continue down to lit -->
  <path d="M185,516 Q185,538 255,555" stroke="#a6e3a1" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
</svg>
