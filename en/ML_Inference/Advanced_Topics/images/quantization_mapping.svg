<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#f8f9fa" rx="10" ry="10"/>

  <!-- Float Axis -->
  <line x1="50" y1="80" x2="550" y2="80" stroke="#333" stroke-width="2"/>
  <text x="50" y="60" font-family="Arial" font-size="14" font-weight="bold">FP32 Range (Continuous)</text>
  <text x="50" y="100" font-family="Arial" font-size="12">-Max</text>
  <text x="300" y="100" font-family="Arial" font-size="12">0.0</text>
  <text x="550" y="100" font-family="Arial" font-size="12">+Max</text>
  <circle cx="300" y="80" r="4" fill="#007bff"/>

  <!-- Mapping Arrows -->
  <path d="M 100 120 Q 150 180 200 220" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 300 120 Q 300 180 300 220" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 500 120 Q 450 180 400 220" stroke="#6c757d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Int Axis -->
  <line x1="200" y1="240" x2="400" y2="240" stroke="#333" stroke-width="2"/>
  <text x="200" y="280" font-family="Arial" font-size="14" font-weight="bold">INT8 Range (Discrete)</text>
  <text x="200" y="260" font-family="Arial" font-size="12">-127</text>
  <text x="300" y="260" font-family="Arial" font-size="12">0 (Zero-Point)</text>
  <text x="400" y="260" font-family="Arial" font-size="12">+127</text>

  <!-- Discrete Points -->
  <circle cx="200" y="240" r="3" fill="#dc3545"/>
  <circle cx="225" y="240" r="3" fill="#dc3545"/>
  <circle cx="250" y="240" r="3" fill="#dc3545"/>
  <circle cx="275" y="240" r="3" fill="#dc3545"/>
  <circle cx="300" y="240" r="3" fill="#dc3545"/>
  <circle cx="325" y="240" r="3" fill="#dc3545"/>
  <circle cx="350" y="240" r="3" fill="#dc3545"/>
  <circle cx="375" y="240" r="3" fill="#dc3545"/>
  <circle cx="400" y="240" r="3" fill="#dc3545"/>

  <!-- Formula Overlay -->
  <rect x="420" y="150" width="160" height="60" fill="white" stroke="#28a745" stroke-width="2" rx="5"/>
  <text x="430" y="175" font-family="Courier New" font-size="12" font-weight="bold">Scale = Max / 127</text>
  <text x="430" y="195" font-family="Courier New" font-size="12" font-weight="bold">Int = round(Float/S)</text>

  <!-- Arrow Marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6c757d" />
    </marker>
  </defs>
</svg>
