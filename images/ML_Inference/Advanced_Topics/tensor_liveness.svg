<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#fcfcfc" stroke="#eee" stroke-width="2"/>

  <!-- Time Axis -->
  <line x1="100" y1="350" x2="550" y2="350" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="300" y="380" font-family="Arial" font-size="14" font-weight="bold">Execution Timeline (Layer Index)</text>

  <!-- Layer Ticks -->
  <text x="100" y="365" font-family="Arial" font-size="12">L0</text>
  <text x="180" y="365" font-family="Arial" font-size="12">L1</text>
  <text x="260" y="365" font-family="Arial" font-size="12">L2</text>
  <text x="340" y="365" font-family="Arial" font-size="12">L3</text>
  <text x="420" y="365" font-family="Arial" font-size="12">L4</text>
  <text x="500" y="365" font-family="Arial" font-size="12">L5</text>

  <!-- Tensor Intervals -->

  <!-- Tensor A (L0 -> L2) -->
  <rect x="100" y="80" width="160" height="30" fill="#007bff" opacity="0.7" rx="5"/>
  <text x="110" y="100" font-family="Arial" font-size="12" fill="white" font-weight="bold">Tensor A (Working Set)</text>

  <!-- Tensor B (L1 -> L4) -->
  <rect x="180" y="130" width="240" height="30" fill="#dc3545" opacity="0.7" rx="5"/>
  <text x="190" y="150" font-family="Arial" font-size="12" fill="white" font-weight="bold">Tensor B (Activations)</text>

  <!-- Tensor C (L3 -> L5) - Aliased with A -->
  <rect x="340" y="80" width="160" height="30" fill="#28a745" opacity="0.7" rx="5"/>
  <text x="350" y="100" font-family="Arial" font-size="12" fill="white" font-weight="bold">Tensor C (Aliased with A)</text>

  <!-- Allocation Explanation -->
  <rect x="100" y="220" width="450" height="100" fill="#fff" stroke="#aaa" stroke-dasharray="5,5"/>
  <text x="110" y="240" font-family="Arial" font-size="12" font-weight="bold">Memory Optimizer Logic:</text>
  <text x="110" y="260" font-family="Arial" font-size="11">1. Tensor A and C intervals do NOT overlap.</text>
  <text x="110" y="275" font-family="Arial" font-size="11">2. Map both to Offset 0 in the Global Memory Pool.</text>
  <text x="110" y="290" font-family="Arial" font-size="11">3. Tensor B overlaps with both, so it needs a unique Offset.</text>
  <text x="110" y="305" font-family="Arial" font-size="11" fill="#dc3545">Total Memory saved: 33%</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>
</svg>
