<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <pattern id="checker" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="9" height="9" fill="#313244" opacity="0.5"/>
      <rect x="9" y="9" width="9" height="9" fill="#313244" opacity="0.5"/>
      <rect x="9" y="0" width="9" height="9" fill="#1e1e2e" opacity="0.2"/>
      <rect x="0" y="9" width="9" height="9" fill="#1e1e2e" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#cdd6f4" font-size="17" font-weight="bold">Alpha-Tested Foliage: The Performance Problem</text>

  <!-- ============================================================ -->
  <!-- LEAF TRIANGLE (large, centered upper half) -->
  <!-- ============================================================ -->

  <!-- The transparent outer zone: full triangle with checker texture (shows "holes") -->
  <polygon points="400,60 210,300 590,300" fill="url(#checker)" stroke="#45475a" stroke-width="1.5"/>

  <!-- The opaque leaf body (leaf-shaped inner polygon) -->
  <ellipse cx="400" cy="195" rx="95" ry="120" fill="#a6e3a1" opacity="0.78" transform="rotate(-5, 400, 195)"/>
  <!-- Leaf veins -->
  <line x1="400" y1="95" x2="400" y2="288" stroke="#40a02b" stroke-width="1.5" opacity="0.5"/>
  <line x1="370" y1="155" x2="430" y2="170" stroke="#40a02b" stroke-width="1" opacity="0.4"/>
  <line x1="368" y1="195" x2="432" y2="210" stroke="#40a02b" stroke-width="1" opacity="0.4"/>
  <line x1="373" y1="240" x2="427" y2="252" stroke="#40a02b" stroke-width="1" opacity="0.4"/>

  <!-- Triangle outline -->
  <polygon points="400,60 210,300 590,300" fill="none" stroke="#74c7ec" stroke-width="2"/>

  <!-- Labels on the triangle -->
  <text x="318" y="118" fill="#9399b2" font-size="11" transform="rotate(-40,318,118)">Transparent</text>
  <text x="490" y="118" fill="#9399b2" font-size="11" transform="rotate(40,490,118)">Transparent</text>
  <text x="290" y="288" fill="#9399b2" font-size="11">Transparent</text>
  <text x="470" y="288" fill="#9399b2" font-size="11">Transparent</text>
  <text x="400" y="200" fill="#1e1e2e" font-size="13" font-weight="bold" text-anchor="middle">Opaque Leaf</text>

  <!-- Triangle label -->
  <text x="400" y="50" text-anchor="middle" fill="#89b4fa" font-size="12">One GPU triangle  =  many transparent pixels + one leaf shape</text>

  <!-- ============================================================ -->
  <!-- SHADOW RAYS arriving from below-left -->
  <!-- ============================================================ -->

  <!-- Ray 1: hits transparent zone — passes through -->
  <line x1="155" y1="420" x2="265" y2="252" stroke="#f9e2af" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <line x1="265" y1="252" x2="215" y2="165" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="148" y="438" text-anchor="middle" fill="#f9e2af" font-size="11">Ray 1</text>
  <!-- "?" inspect bubble -->
  <circle cx="265" cy="252" r="13" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="265" y="257" text-anchor="middle" fill="#f9e2af" font-size="12" font-weight="bold">?</text>
  <!-- Result: passed through -->
  <text x="200" y="155" fill="#a6e3a1" font-size="11">Transparent →</text>
  <text x="200" y="168" fill="#a6e3a1" font-size="11">ray continues</text>

  <!-- Ray 2: hits opaque leaf body — blocked -->
  <line x1="295" y1="430" x2="380" y2="260" stroke="#f9e2af" stroke-width="2"/>
  <!-- Stop marker -->
  <circle cx="380" cy="262" r="7" fill="#f38ba8" opacity="0.9"/>
  <text x="292" y="448" text-anchor="middle" fill="#f9e2af" font-size="11">Ray 2</text>
  <circle cx="380" cy="262" r="13" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="380" y="267" text-anchor="middle" fill="#f9e2af" font-size="12" font-weight="bold">?</text>
  <text x="330" y="240" fill="#f38ba8" font-size="11">Opaque →</text>
  <text x="330" y="253" fill="#f38ba8" font-size="11">ray blocked</text>

  <!-- Ray 3: hits transparent zone — passes through -->
  <line x1="490" y1="425" x2="540" y2="265" stroke="#f9e2af" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <line x1="540" y1="265" x2="580" y2="180" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="493" y="443" text-anchor="middle" fill="#f9e2af" font-size="11">Ray 3</text>
  <circle cx="540" cy="265" r="13" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="540" y="270" text-anchor="middle" fill="#f9e2af" font-size="12" font-weight="bold">?</text>
  <text x="545" y="190" fill="#a6e3a1" font-size="11">→ ray continues</text>

  <!-- ============================================================ -->
  <!-- COST CALLOUT BOX -->
  <!-- ============================================================ -->
  <rect x="30" y="360" width="240" height="110" rx="8" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="150" y="382" text-anchor="middle" fill="#f38ba8" font-size="13" font-weight="bold">Runtime Cost (Per Frame)</text>
  <text x="150" y="402" text-anchor="middle" fill="#cdd6f4" font-size="12">For EVERY shadow ray:</text>
  <text x="150" y="420" text-anchor="middle" fill="#cdd6f4" font-size="11">1. Find UV at hit point (barycentrics)</text>
  <text x="150" y="436" text-anchor="middle" fill="#cdd6f4" font-size="11">2. Sample alpha texture</text>
  <text x="150" y="452" text-anchor="middle" fill="#cdd6f4" font-size="11">3. Decide: pass or block?</text>

  <!-- Bottom caption -->
  <rect x="175" y="455" width="450" height="34" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="400" y="469" text-anchor="middle" fill="#9399b2" font-size="12">Every shadow ray × every leaf triangle = one texture sample each frame</text>
  <text x="400" y="483" text-anchor="middle" fill="#f38ba8" font-size="11">Thousands of triangles × millions of rays × 60 fps = enormous shader cost</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9e2af" opacity="0.6"/>
    </marker>
  </defs>
</svg>
